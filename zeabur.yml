# Zeabur Configuration for Swarm TM Frontend
# React 19 + Vite threat modeling dashboard

name: swarm-tm-frontend

services:
  - name: frontend
    type: dockerfile

    # Build Configuration
    build:
      dockerfile: Dockerfile
      context: .

      # Build arguments (passed to docker build)
      # Backend URL is hardcoded here for reliable injection during build
      buildArgs:
        VITE_API_BASE_URL: https://swarm-tm-backend.zeabur.app

    # Port Configuration (nginx will serve on port 80 internally)
    port: 80

    # Health Check
    healthCheck:
      path: /
      interval: 30
      timeout: 10
      retries: 3

    # Resource Configuration
    resources:
      # Frontend static site needs minimal resources
      cpu: 0.5
      memory: 512  # 512MB RAM sufficient for static hosting

    # Deployment Strategy
    deployment:
      # Zero-downtime deployment
      strategy: rolling

      # Auto-restart on failure
      restartPolicy: always

      # Scaling (multiple replicas for high availability)
      replicas: 1

    # Custom Headers (optional - for security)
    headers:
      X-Frame-Options: DENY
      X-Content-Type-Options: nosniff
      X-XSS-Protection: "1; mode=block"
      Referrer-Policy: no-referrer-when-downgrade

# Instructions for deployment:
#
# 1. Deploy Backend First:
#    - Deploy swarm-tm-backend to Zeabur
#    - Note the backend URL: https://swarm-tm-backend.zeabur.app
#
# 2. Backend URL Configuration:
#    - Backend URL is hardcoded in buildArgs above (line 18)
#    - This ensures reliable injection during Docker build
#    - To change URL: Edit line 18 and push to GitHub
#
#    ⚠️ IMPORTANT: Vite injects env vars at BUILD time, not runtime
#    The hardcoded approach is most reliable for Zeabur deployments
#
# 3. Deploy Frontend:
#    - Push to GitHub (Zeabur auto-deploys)
#    - Wait for build to complete (2-5 minutes)
#    - Check build logs: Should show ARG VITE_API_BASE_URL=https://swarm-tm-backend.zeabur.app
#
# 4. Update Backend CORS:
#    - After frontend deployment, get frontend URL
#    - Update backend environment variable:
#      CORS_ORIGINS=https://swarm-tm-frontend.zeabur.app,http://localhost:5173
#    - Redeploy backend or restart service
#
# 5. Verify:
#    - Visit frontend URL
#    - Check for green "Backend: Healthy" banner
#    - If backend unreachable, error should show correct URL (not localhost:8000)
#    - Test uploading IaC file and running threat model
