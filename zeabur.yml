# Instructions for deployment:
#
# 1. Deploy Backend First:
#    - Deploy swarm-tm-backend to Zeabur
#    - Note the backend URL: https://swarm-tm-backend-xxx.zeabur.app
#
# 2. Update VITE_API_BASE_URL:
#    - Option A: Edit this file before pushing to GitHub
#      VITE_API_BASE_URL: https://swarm-tm-backend-xxx.zeabur.app
#
#    - Option B: Set in Zeabur Dashboard (BEFORE first deployment)
#      Dashboard → Service → Environment Variables
#      VITE_API_BASE_URL = https://swarm-tm-backend-xxx.zeabur.app
#
#    ⚠️ IMPORTANT: This must be set BEFORE deployment
#    Vite injects env vars at build time, not runtime
#
# 3. Deploy Frontend:
#    - Push to GitHub or use Zeabur CLI
#    - Zeabur will automatically use this configuration
#    - Wait for build to complete (2-5 minutes)
#
# 4. Update Backend CORS:
#    - After frontend deployment, get frontend URL
#    - Update backend environment variable:
#      CORS_ORIGINS=https://swarm-tm-frontend-yyy.zeabur.app
#    - Redeploy backend or restart service
#
# 5. Verify:
#    - Visit frontend URL
#    - Check for green "Backend: Healthy" banner
#    - Test uploading IaC file and running threat model
#
# 6. To Change Backend URL Later:
#    - Update VITE_API_BASE_URL in Zeabur Dashboard
#    - Trigger rebuild/redeploy (push to GitHub or manual redeploy)
#    - Wait for new build with updated URL
