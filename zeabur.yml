# Zeabur Configuration for Swarm TM Frontend
# React 19 + Vite threat modeling dashboard

name: swarm-tm-frontend

services:
  - name: frontend
    type: static

    # Build Configuration
    build:
      # Node.js version
      runtime: node-20

      # Install command
      install: npm install

      # Build command
      build: npm run build

      # Output directory (Vite builds to dist/)
      outputDirectory: dist

      # Static file serving with nginx
      staticServe: true

    # Environment Variables
    # CRITICAL: These are injected at BUILD TIME by Vite, not runtime
    env:
      # Backend API URL (REQUIRED - update after backend deployment)
      VITE_API_BASE_URL: http://localhost:8000

      # For production, update to your deployed backend URL:
      # VITE_API_BASE_URL: https://swarm-tm-backend-xxx.zeabur.app
      # Or custom domain:
      # VITE_API_BASE_URL: https://api.yourdomain.com

    # Port Configuration (nginx will serve on port 80 internally)
    port: 80

    # Health Check
    healthCheck:
      path: /
      interval: 30
      timeout: 10
      retries: 3

    # Resource Configuration
    resources:
      # Frontend static site needs minimal resources
      cpu: 0.5
      memory: 512  # 512MB RAM sufficient for static hosting

    # Deployment Strategy
    deployment:
      # Zero-downtime deployment
      strategy: rolling

      # Auto-restart on failure
      restartPolicy: always

      # Scaling (multiple replicas for high availability)
      replicas: 1

    # Custom Headers (optional - for security)
    headers:
      X-Frame-Options: DENY
      X-Content-Type-Options: nosniff
      X-XSS-Protection: "1; mode=block"
      Referrer-Policy: no-referrer-when-downgrade

# Alternative Configuration: Using Dockerfile
# If you prefer nginx-based deployment with Dockerfile instead of static hosting:
#
# services:
#   - name: frontend
#     type: dockerfile
#
#     build:
#       dockerfile: Dockerfile
